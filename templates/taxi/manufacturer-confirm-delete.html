{% extends "base.html" %}

{% block content %}
  <h1>Delete Manufacturer</h1>
  <p>Are you sure you want to delete manufacturer: {{ manufacturer }} ?</p>
  <p><i>All cars with this manufacturer been deleted</i></p>
  <form action="" method="post">
    {% csrf_token %}
    <input class="btn btn-danger" type="submit" value="Yes, delete">
    <a href="{{ request.META.HTTP_REFERER|default:'' }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
